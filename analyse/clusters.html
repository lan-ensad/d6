<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clusters — Regroupement hiérarchique</title>
<link rel="stylesheet" href="style.css">
<style>
  .container { display: flex; gap: 2rem; flex-wrap: wrap; align-items: flex-start; }

  .panel {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .panel h2 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 1rem 0;
    color: #2c3e50;
  }

  svg text { font-family: 'Inter', -apple-system, sans-serif; }

  /* Matrix */
  .matrix-cell { cursor: default; }
  .matrix-cell:hover { stroke: #2c3e50; stroke-width: 1.5; }

  #tooltip {
    position: fixed;
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: #2c3e50;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    pointer-events: none;
    display: none;
    z-index: 100;
  }

  .legend-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1rem;
    font-size: 11px;
    color: #7f8c8d;
  }
  .legend-gradient {
    width: 120px;
    height: 12px;
    border-radius: 3px;
    background: linear-gradient(to right, #4a90d9, #e8eef4);
  }
</style>
</head>
<body>

<nav>
  <a href="sommaire.html">Sommaire</a>
  <a href="index.html">TF-IDF</a>
  <a href="clusters.html" class="active">Clusters</a>
  <a href="tags.html">Tags</a>
</nav>

<h1>Regroupement hiérarchique des textes</h1>

<div class="controls">
  <label>Longueur min. du mot:
    <input type="range" id="minLen" min="2" max="20" value="3">
    <span id="minLenVal">3</span>
  </label>
  <label>Méthode de lien:
    <select id="linkage">
      <option value="average">Average</option>
      <option value="single">Single</option>
      <option value="complete">Complete</option>
    </select>
  </label>
</div>

<div class="container">
  <div class="panel">
    <h2>Dendrogramme</h2>
    <svg id="dendro"></svg>
  </div>
  <div class="panel">
    <h2>Matrice de similarité cosinus</h2>
    <svg id="matrix"></svg>
    <div class="legend-bar">
      <span>similaire</span>
      <div class="legend-gradient"></div>
      <span>distant</span>
    </div>
  </div>
</div>

<h1 style="margin-top:2rem;">Mots-clés par texte</h1>
<div class="grid" id="words"></div>

<div id="tooltip"></div>

<script src="common.js"></script>
<script src="clusters.js"></script>
</body>
</html>
